<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MaïmoLab V3 - Formulaire de Sciences</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=1">
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="app-container">
        <!-- HEADER -->
        <header>
            <div class="header-inner">
                <div class="brand">
                    <div class="brand-top">
                        <div class="icon-circle"><i data-lucide="flask-conical"></i></div>
                        <span>MaïmoLab V3</span>
                    </div>
                    <span class="directed-by">By Ariel Koskas</span>
                </div>
                <!-- SEARCH BAR ALWAYS VISIBLE -->
                <div class="search-wrap">
                    <i data-lucide="search"></i>
                    <input type="text" id="main-search" placeholder="Réchercher un chapitre, une formule...">
                </div>
            </div>

            <!-- LEVEL SELECTOR (TABS) -->
            <div class="level-bar">
                <button class="level-tab active" data-level="1ere">Première</button>
                <button class="level-tab" data-level="2nde">Seconde</button>
            </div>
        </header>

        <!-- MAIN VIEW: CHAPTER GRID OR FORMULA LIST -->
        <main id="main-content">
            <div class="view-header">
                <h2 id="view-title">Chapitres de Première</h2>
                <button id="back-btn" class="hidden">
                    <i data-lucide="chevron-left"></i> Retour aux chapitres
                </button>
            </div>

            <!-- This container will swap between Chapter Grid and Formula List -->
            <div id="grid-container" class="grid-container">
                <!-- Content generated by script.js -->
            </div>
            
            <div id="no-results" class="hidden">
                <div class="empty-state">
                    <i data-lucide="frown" style="width:48px;height:48px"></i>
                    <h3>Aucun résultat trouvé</h3>
                    <p>Essaie une autre recherche !</p>
                </div>
            </div>
        </main>

        <!-- DETAIL MODAL -->
        <div id="modal-overlay" class="modal-overlay">
            <div class="modal-window glass">
                <button class="modal-close"><i data-lucide="x"></i></button>
                <div class="modal-header">
                    <span id="modal-tag" class="modal-badge physique">PHYSIQUE • 1ere</span>
                    <h2 id="modal-title">Titre de la formule</h2>
                </div>
                <div class="modal-tabs">
                    <button class="tab-trigger active" data-tab="eqn">Formule</button>
                    <button class="tab-trigger" data-tab="def">Définition</button>
                    <button class="tab-trigger" data-tab="prop">Propriétés</button>
                </div>
                <div class="modal-body">
                    <div class="tab-panel active" id="tab-eqn">
                        <div class="math-display" id="math-box"></div>
                        <div class="units-legend">
                            <h4>Unités & Symboles :</h4>
                            <p id="modal-units">—</p>
                        </div>
                    </div>
                    <div class="tab-panel" id="tab-def">
                        <p id="modal-def">—</p>
                    </div>
                    <div class="tab-panel" id="tab-prop">
                        <p id="modal-prop">—</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- FOOTER WIDGETS -->
        <footer>
            <div id="counter">📚 <strong id="count-num">—</strong> formules répertoriées</div>
        </footer>
        <button id="copy-btn" onclick="copyLink()">📋 Copier le lien</button>
        <div id="toast"></div>
    </div>

    <script src="script.js"></script>
    <script>
      lucide.createIcons();
      function copyLink() {
        navigator.clipboard.writeText(location.href).then(() => {
          const t = document.getElementById('toast');
          t.textContent = '✅ Lien copié ! Partage-le à tes camarades';
          t.classList.add('show');
          setTimeout(() => t.classList.remove('show'), 2000);
          document.getElementById('copy-btn').textContent = '✓ Copié !';
          setTimeout(() => document.getElementById('copy-btn').textContent = '📋 Copier le lien', 2000);
        });
      }
    </script>
</body>
</html>
